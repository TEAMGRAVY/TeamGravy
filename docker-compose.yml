services:
  backend:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
    ports:
      - "7000:7000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    command: sh -c "node_modules/.bin/vite --host --mode docker"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - VITE_BACKEND_URL=http://backend:7000

networks:
  app-network:
    driver: bridge